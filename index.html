<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG SÁT HẠCH NGHỀ KHOA MÁY THI CÔNG - CAEE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --caee-blue: #003399; --header-blue: #0040cc;
            --btn-orange: #ff6600; --btn-blue: #3366ff;
            --success: #28a745; --danger: #dc3545;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Arial, sans-serif; padding-top: 70px; }

        /* Lớp phủ cảnh báo gian lận */
        #warning-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(220, 53, 69, 0.95); color: white; z-index: 9999;
            justify-content: center; align-items: center; text-align: center; font-size: 2rem; flex-direction: column;
        }

        /* Lớp phủ kết quả thi */
        #result-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            z-index: 10000; justify-content: center; align-items: center; text-align: center;
        }
        .result-box {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); max-width: 400px; width: 90%;
            border: 2px solid #eee;
        }

        .caee-header {
            background: var(--header-blue); color: white; padding: 10px 20px;
            display: none; justify-content: space-between; align-items: center;
            position: fixed; top: 0; width: 100%; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .timer-box { background: #ff3333; padding: 8px 15px; border-radius: 4px; font-weight: bold; min-width: 90px; text-align: center; }

        #start-screen { min-height: 80vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .welcome-container { background: white; width: 100%; max-width: 450px; border-radius: 15px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .form-control { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        
        .btn-start { 
            background: var(--success); color: white; border: none; width: 100%; padding: 15px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.2); font-size: 1rem;
        }

        #quiz-screen { padding: 20px; display: none; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1300px; margin: auto; }
        #quiz-content { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .option-item {
            border: 2px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 12px;
            cursor: pointer; transition: 0.2s; font-weight: 500; display: flex; align-items: center;
        }
        .option-item:hover:not(.disabled) { background: #f8f9fa; border-color: var(--btn-blue); }
        .option-item.selected { background: #e7f0ff; border-color: var(--btn-blue); color: var(--caee-blue); }
        .option-item.correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724 !important; }
        .option-item.wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; }

        @media (max-width: 900px) { #quiz-screen { grid-template-columns: 1fr; padding-top: 100px; } }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="warning-overlay">
        <div>⚠️ PHÁT HIỆN GIAN LẬN!</div>
        <div style="font-size: 1.2rem; margin-top: 10px;">Vui lòng quay lại màn hình thi ngay lập tức.</div>
    </div>

    <div id="result-overlay">
        <div class="result-box">
            <h2 id="res-status" style="font-size: 2.5rem; margin-bottom: 10px;">---</h2>
            <p id="res-score" style="font-size: 1.5rem; color: #333; margin-bottom: 20px;">---</p>
            <hr>
            <p style="margin-top: 20px; color: #666;">Hệ thống tự động thoát sau <b id="countdown-text" style="color: var(--danger); font-size: 1.4rem;">5</b> giây...</p>
        </div>
    </div>

    <div class="caee-header" id="caee-header">
        <div style="flex-grow: 1; text-align: center;">
            <div style="font-weight: bold; font-size: 16px;">TRƯỜNG CAO ĐẲNG CƠ ĐIỆN NÔNG NGHIỆP VÀ MÔI TRƯỜNG</div>
            <div id="job-display-header" style="font-weight: bold; font-size: 14px; color: #ffd700;">ĐANG TẢI...</div>
            <div style="font-size: 13px;">HỌC VIÊN: <span id="display-name" style="font-weight: bold;">---</span></div>
        </div>
        <div id="timer" class="timer-box">20:00</div>
    </div>

    <div id="start-screen">
        <div class="welcome-container">
            <h2 style="text-align:center; color:var(--caee-blue); margin-bottom: 20px;">HỆ THỐNG SÁT HẠCH - CAEE</h2>
            <select id="jobType" class="form-control" style="font-weight: bold;">
                <option value="1538604642" data-key="maynang">NGHỀ: VẬN HÀNH XE NÂNG HÀNG</option>
                <option value="798209567" data-key="cantruc">NGHỀ: VẬN HÀNH CẦN TRỤC</option>
                <option value="1969781180" data-key="cautruc">NGHỀ: VẬN HÀNH CẦU TRỤC</option>
            </select>
            <input type="text" id="studentName" class="form-control" placeholder="Họ và Tên học viên">
            <input type="text" id="studentID" class="form-control" placeholder="Mã học viên / Khóa thi (VD: K01)">
            
            <div style="display:flex; align-items:center; margin: 15px 0; justify-content: center; gap:10px;">
                <input type="checkbox" id="modeToggle" style="width:20px; height:20px; cursor:pointer;">
                <label for="modeToggle" style="cursor:pointer;">Chế độ Ôn tập (Hiện giải thích)</label>
            </div>
            <button class="btn-start" onclick="startQuiz()">VÀO THI NGAY ➔</button>
        </div>
    </div>

    <div id="quiz-screen">
        <div id="quiz-content"></div>
        <div class="sidebar-right">
            <div style="background:white; padding:20px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 80px;">
                <h4 style="margin-bottom:15px; text-align:center;">SƠ ĐỒ CÂU HỎI</h4>
                <div id="nav-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:8px;"></div>
                <button id="submitBtn" class="btn-start" style="margin-top:20px; background-color: var(--caee-blue);" onclick="submitQuiz()">NỘP BÀI</button>
            </div>
        </div>
    </div>

<script>
    const BASE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7h1KNottkL2N-DEBjkUVVlXLblXy25_x1UhqML8WQz3AWeWeXFuvkSQUb4Sxv5eaK5T-VJQEWh4wB/pub?output=csv&gid=";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbybZMcHoswAeQG01RCi7efMKY3NpqasVYDxSIhADkZYS38Nj7_XbrFZG6ozgLXYSzym/exec";

   let currentStudentName = "", currentStudentID = "", currentJobName = "", currentJobKey = "";
    let allQuestions = [], selectedQuestions = [], studentAnswers = [];
    let currentQuestionIndex = 0, timeLeft = 1200, timerInterval, isSubmitted = false, cheatCount = 0;

    // --- CÁC HÀM KHỞI TẠO GIỮ NGUYÊN ---
    async function startQuiz() {
        const nameVal = document.getElementById('studentName').value.trim();
        const idVal = document.getElementById('studentID').value.trim();
        const jobSelect = document.getElementById('jobType');
        const gid = jobSelect.value;
        if(!nameVal || !idVal) return alert("Vui lòng nhập đầy đủ thông tin!");
        currentStudentName = nameVal;
        currentStudentID = idVal;
        currentJobName = jobSelect.options[jobSelect.selectedIndex].text;
        currentJobKey = jobSelect.options[jobSelect.selectedIndex].getAttribute('data-key');

        Papa.parse(BASE_CSV_URL + gid, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                allQuestions = results.data.filter(i => i.CauHoi).map(i => ({
                    question: i.CauHoi,
                    options: [i.A, i.B, i.C, i.D].filter(o => o && o.trim() !== ""),
                    answer: i.DapAnDung ? i.DapAnDung.trim().toUpperCase() : "",
                    explanation: i.Giaithich || "Thực hiện đúng quy trình an toàn."
                }));
                selectedQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 30);
                document.getElementById('display-name').innerText = currentStudentName.toUpperCase();
                document.getElementById('job-display-header').innerText = currentJobName;
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('caee-header').style.display = 'flex';
                document.getElementById('quiz-screen').style.display = 'grid';
                showQuestion(0); startTimer();
            }
        });
    }

    function showQuestion(idx) {
        if (idx < 0 || idx >= 30 || isSubmitted) return;
        currentQuestionIndex = idx;
        const q = selectedQuestions[idx];
        const stored = studentAnswers.find(a => a.qIndex === idx);
        const isPractice = document.getElementById('modeToggle').checked;
        const labels = ['A', 'B', 'C', 'D'];

        let html = `<h3 style="margin-bottom:20px; color:var(--caee-blue); line-height:1.4;">Câu ${idx + 1}: ${q.question}</h3>`;
        q.options.forEach((opt, i) => {
            let cls = "";
            const isSelected = stored && opt === stored.selected;
            if (isPractice && stored) {
                if (labels[i] === q.answer) cls = "correct";
                else if (isSelected) cls = "wrong";
            } else if (isSelected) cls = "selected";
            
            let action = (isPractice && stored) ? "" : `onclick="selectAns(${idx}, '${opt.replace(/'/g, "\\'")}')"`;
            html += `<div class="option-item ${cls}" ${action}><b>${labels[i]}.</b>&nbsp;${opt}</div>`;
        });

        if(isPractice && stored) html += `<div style="background:#fff3cd; padding:15px; border-radius:8px; border-left:5px solid #ffa000; margin-top:10px;"><b>Giải thích:</b> ${q.explanation}</div>`;
        
        html += `<div style="display:flex; justify-content:space-between; margin-top:20px; gap:10px;">
                    <button class="btn-start" style="background:var(--btn-blue);" onclick="showQuestion(${idx-1})" ${idx===0?'disabled':''}>Lùi lại</button>
                    <button class="btn-start" style="background:var(--btn-blue);" onclick="showQuestion(${idx+1})" ${idx===29?'disabled':''}>Tiếp theo</button>
                </div>`;
        document.getElementById('quiz-content').innerHTML = html;
        renderGrid();
    }

    // --- CẬP NHẬT LOGIC CHỌN ĐÁP ÁN ---
    function selectAns(qIdx, ans) {
        if (isSubmitted) return;
        
        const i = studentAnswers.findIndex(a => a.qIndex === qIdx);
        if(i > -1) studentAnswers[i].selected = ans;
        else studentAnswers.push({qIndex: qIdx, selected: ans});
        
        showQuestion(qIdx); // Cập nhật màu sắc hiển thị

        if(qIdx === 29) {
            // Câu 30: Hiện xác nhận nộp bài ngay lập tức sau khi chọn
            setTimeout(() => { 
                submitQuiz(); 
            }, 100);
        } else {
            // Các câu khác: Tự động chuyển câu sau 3 giây (3000ms)
            setTimeout(() => {
                // Kiểm tra nếu người dùng chưa chuyển câu thủ công thì mới tự chuyển
                if(currentQuestionIndex === qIdx) {
                    showQuestion(qIdx + 1);
                }
            }, 3000);
        }
    }

    function renderGrid() {
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = "";
        selectedQuestions.forEach((_, i) => {
            const hasAns = studentAnswers.some(a => a.qIndex === i);
            const active = i === currentQuestionIndex ? 'border:3px solid var(--btn-orange);' : '';
            const bg = hasAns ? 'background:var(--caee-blue); color:white;' : 'background:white;';
            grid.innerHTML += `<div onclick="showQuestion(${i})" style="height:40px; display:flex; justify-content:center; align-items:center; border-radius:5px; cursor:pointer; font-weight:bold; ${bg} ${active}">${i+1}</div>`;
        });
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(timeLeft <= 0) submitQuiz(true);
        }, 1000);
    }

    // --- CẬP NHẬT LOGIC KẾT THÚC THI ---
    async function submitQuiz(auto = false) {
        if (isSubmitted) return;
        
        // Hiện hộp thoại xác nhận nộp bài (đối với câu 30 hoặc nút nộp bài)
        if (!auto && !confirm("Bạn xác nhận nộp bài thi để xem kết quả?")) return;
        
        isSubmitted = true;
        clearInterval(timerInterval);

        let score = 0;
        const labels = ['A', 'B', 'C', 'D'];
        selectedQuestions.forEach((q, i) => {
            const ans = studentAnswers.find(a => a.qIndex === i);
            if (ans) {
                const idx = q.options.indexOf(ans.selected);
                if (idx !== -1 && labels[idx] === q.answer) score++;
            }
        });

        const statusText = score >= 25 ? "ĐẠT" : "KHÔNG ĐẠT";
        
        // Hiển thị Overlay Kết quả ngay lập tức
        document.getElementById('res-status').innerText = statusText;
        document.getElementById('res-status').style.color = score >= 25 ? "var(--success)" : "var(--danger)";
        document.getElementById('res-score').innerText = `Kết quả: ${score}/30 câu`;
        document.getElementById('countdown-text').innerText = "8"; // Reset số hiển thị về 8
        document.getElementById('result-overlay').style.display = 'flex';

        // Gửi dữ liệu ngầm về Google Sheets
        const params = new URLSearchParams({
            'name': currentStudentName,
            'studentID': currentStudentID,
            'jobKey': currentJobKey,
            'jobName': currentJobName,
            'score': score + "/30",
            'status': statusText,
            'mode': document.getElementById('modeToggle').checked ? "ONTAP" : "THI",
            'cheat': cheatCount
        });
        fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: params.toString() });

        // Tự động đếm ngược 8 giây để quay về màn hình đăng nhập
        let countdown = 8;
        const countdownTimer = setInterval(() => {
            countdown--;
            document.getElementById('countdown-text').innerText = countdown;
            if (countdown <= 0) {
                clearInterval(countdownTimer);
                location.reload(); // Quay về màn hình đăng nhập
            }
        }, 1000);
    }
</script>
</body>
</html>
